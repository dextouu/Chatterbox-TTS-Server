name: Sync upstream & Build Docker

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync:
    name: Sync upstream
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: VÃ©rifier si upstream a changÃ©
        id: check
        run: |
          UPSTREAM_SHA=$(git ls-remote https://github.com/devnen/Chatterbox-TTS-Server.git HEAD | cut -f1)
          
          # Lire le SHA stockÃ© dans mon repo
          LOCAL_SHA=$(curl -sf \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://raw.githubusercontent.com/${{ github.repository }}/main/.upstream-sha" \
            || echo "")

          VERSION=$(git ls-remote --tags https://github.com/devnen/Chatterbox-TTS-Server.git \
            | grep -v '{}' | awk '{print $2}' | sed 's|refs/tags/||' \
            | sort -V | tail -1)

          echo "version=${VERSION:-latest}" >> $GITHUB_OUTPUT

          if [ "$LOCAL_SHA" = "$UPSTREAM_SHA" ]; then
            echo "Pas de changement."
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "Nouveau commit dÃ©tectÃ©."
            echo "changed=true" >> $GITHUB_OUTPUT

            # Clone upstream et push dans mon repo
            git clone https://github.com/devnen/Chatterbox-TTS-Server.git sources
            cd sources
            git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
            echo "$UPSTREAM_SHA" > .upstream-sha
            git add .upstream-sha
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "sync: upstream $UPSTREAM_SHA"
            git push origin HEAD:main --force
          fi

  build:
    name: Build ${{ matrix.variant }}
    needs: sync
    if: needs.sync.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: rocm
            dockerfile: Dockerfile.rocm
          - variant: strixhalo
            dockerfile: Dockerfile.strixhalo

    steps:
      - name: Checkout mon repo
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository }}:${{ matrix.variant }}-${{ needs.sync.outputs.version }}
            ghcr.io/${{ github.repository }}:${{ matrix.variant }}-latest
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}
