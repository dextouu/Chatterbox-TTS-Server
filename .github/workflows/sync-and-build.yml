name: Sync upstream & Build Docker

on:
  schedule:
    # Vérification toutes les 6h
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync:
    name: Sync upstream sources
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.sync.outputs.changed }}
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync from upstream
        id: sync
        run: |
          git remote add upstream https://github.com/devnen/Chatterbox-TTS-Server.git || true
          git fetch upstream

          LOCAL=$(git rev-parse HEAD)
          UPSTREAM=$(git rev-parse upstream/main)

          if [ "$LOCAL" = "$UPSTREAM" ]; then
            echo "No changes from upstream."
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "Upstream has new commits — merging."
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git merge upstream/main --no-edit
            git push origin main
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

  build:
    name: Build & push Docker image
    needs: sync
    if: needs.sync.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # Retire linux/arm64 si tu n'as pas besoin de ARM
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
