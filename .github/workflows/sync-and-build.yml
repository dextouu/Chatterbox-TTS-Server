name: Sync upstream & Build Docker

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  sync:
    name: Sync upstream
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.sync.outputs.changed }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync from upstream
        id: sync
        run: |
          git remote add upstream https://github.com/devnen/Chatterbox-TTS-Server.git || true
          git fetch upstream --tags

          UPSTREAM=$(git rev-parse upstream/main)

          if git show-ref --verify --quiet refs/heads/main; then
            LOCAL=$(git rev-parse HEAD)
          else
            LOCAL=""
          fi

          if [ "$LOCAL" = "$UPSTREAM" ]; then
            echo "No changes."
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git reset --hard upstream/main
            git push origin main --force --tags
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Get latest upstream version
        id: version
        run: |
          VERSION=$(git tag --sort=-version:refname | head -1)
          echo "version=${VERSION:-latest}" >> $GITHUB_OUTPUT

  build:
    name: Build ${{ matrix.variant }}
    needs: sync
    if: needs.sync.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: rocm
            dockerfile: Dockerfile.rocm
          - variant: strixhalo
            dockerfile: Dockerfile.strixhalo

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository }}:${{ matrix.variant }}-${{ needs.sync.outputs.version }}
            ghcr.io/${{ github.repository }}:${{ matrix.variant }}-latest
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}
