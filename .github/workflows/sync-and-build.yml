name: Sync upstream & Build Docker

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  UPSTREAM_URL: https://github.com/devnen/Chatterbox-TTS-Server.git
  IMAGE_NAME: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: rocm
            dockerfile: Dockerfile.rocm
          - variant: strixhalo
            dockerfile: Dockerfile.strixhalo

    steps:
      # Ã‰tape 1 : VÃ©rifier si upstream a changÃ©
      - name: Check upstream SHA
        id: check
        run: |
          UPSTREAM_SHA=$(git ls-remote ${{ env.UPSTREAM_URL }} HEAD | cut -f1)
          LOCAL_SHA=$(curl -sf \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://raw.githubusercontent.com/${{ github.repository }}/main/.upstream-sha" \
            || echo "")
          echo "upstream_sha=$UPSTREAM_SHA" >> $GITHUB_OUTPUT
          if [ "$LOCAL_SHA" = "$UPSTREAM_SHA" ] && [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      # Ã‰tape 2 : Cloner upstream si changement
      - name: Clone upstream
        if: steps.check.outputs.changed == 'true'
        run: |
          git clone ${{ env.UPSTREAM_URL }} .

      # Ã‰tape 3 : VÃ©rifier que le Dockerfile existe
      - name: Check for Dockerfile
        if: steps.check.outputs.changed == 'true'
        run: |
          echo "Fichiers prÃ©sents :"
          ls -la
          if [ ! -f ${{ matrix.dockerfile }} ]; then
            echo "Erreur : ${{ matrix.dockerfile }} introuvable."
            exit 1
          fi

      # Ã‰tape 4 : RÃ©cupÃ©rer la derniÃ¨re version
      - name: Get latest version
        if: steps.check.outputs.changed == 'true'
        id: version
        run: |
          VERSION=$(git tag --sort=-version:refname | head -1)
          echo "version=${VERSION:-latest}" >> $GITHUB_OUTPUT

      # Ã‰tape 5 : Configurer Docker Buildx
      - name: Set up Docker Buildx
        if: steps.check.outputs.changed == 'true'
        uses: docker/setup-buildx-action@v3

      # Ã‰tape 6 : Connexion Ã  GHCR
      - name: Login to GHCR
        if: steps.check.outputs.changed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Ã‰tape 7 : Build et push
      - name: Build and push
        if: steps.check.outputs.changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE_NAME }}:${{ matrix.variant }}-${{ steps.version.outputs.version }}
            ${{ env.IMAGE_NAME }}:${{ matrix.variant }}-latest
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}

      # Ã‰tape 8 : Sauvegarder le SHA upstream dans mon repo
      - name: Save upstream SHA
        if: steps.check.outputs.changed == 'true' && matrix.variant == 'rocm'
        run: |
          cd /tmp
          git clone https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git myrepo
          cd myrepo
          echo "${{ steps.check.outputs.upstream_sha }}" > .upstream-sha
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .upstream-sha
          git commit -m "sync: upstream ${{ steps.check.outputs.upstream_sha }}"
          git push origin main